name: Generate llms.txt

on:
  # Weekly schedule: every Monday at 6:00 AM UTC
  schedule:
    - cron: '0 6 * * 1'

  # Allow manual trigger from GitHub UI
  workflow_dispatch:

  # Also run when content files change on main, for faster updates
  push:
    branches: [main]
    paths:
      - 'content/**'
      - 'src/content/**'
      - 'src/pages/**/*.md'
      - 'src/pages/**/*.mdx'
      - 'scripts/generate-llms-txt.mjs'

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Generate llms.txt files
        run: node scripts/generate-llms-txt.mjs

      - name: Check for changes
        id: changes
        run: |
          git add public/llms.txt public/llms-full.txt public/md/
          git diff --cached --quiet || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: auto-update llms.txt and /md/ files"
          git push
